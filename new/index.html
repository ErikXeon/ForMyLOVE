<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Love — Милые игры</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="bg-hearts-layer" aria-hidden="true"></div>
<div id="final-confetti-layer" aria-hidden="true"></div>
<main class="screen" id="welcome-screen">
    <h1>Для моей любимой девочки 💗</h1>
    <p>Я безумно сильно люблю тебя и сделал это для тебя!</p>
    <button id="start-btn" class="btn">Начать игру</button>
</main>

<section class="hud hidden" id="hud" aria-live="polite">
    <h2 id="game-title"></h2>
    <div class="score" id="score-line"></div>
    <button id="skip-level-btn" class="btn btn-skip" type="button">Пропустить уровень</button>
</section>

<section class="game-area hidden" id="game1-area">
    <div id="falling-layer" aria-hidden="true"></div>
</section>

<section class="game-area hidden" id="game2-area">
    <div class="grid pairs-grid" id="pairs-grid"></div>
</section>

<section class="game-area hidden" id="game3-area">
    <div class="grid sequence-grid" id="sequence-grid"></div>
</section>

<section class="game-area hidden" id="game4-area">
    <div class="maze-wrap">
        <div class="maze-grid" id="maze-grid"></div>
        <div class="maze-controls">
            <button type="button" class="maze-btn" data-dir="up">⬆️</button>
            <div>
                <button type="button" class="maze-btn" data-dir="left">⬅️</button>
                <button type="button" class="maze-btn" data-dir="down">⬇️</button>
                <button type="button" class="maze-btn" data-dir="right">➡️</button>
            </div>
        </div>
    </div>
</section>

<section class="screen hidden" id="result-screen">
    <h2 id="result-text">УМНИЧКА МОЯ! ✨</h2>
    <button id="next-btn" class="btn">Следующая игра</button>
</section>

<script src="script.js"></script>
</body>
</html>
